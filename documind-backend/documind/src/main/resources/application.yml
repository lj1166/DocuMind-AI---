spring:
  application:
    name: documind-ai
  
  # 配置文件
  profiles:
    active: dev
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
      enabled: true

server:
  port: 8080
  # 去除context-path，直接在Controller中配置/api前缀
  # servlet:
  #   context-path: /api

# DocuMind 配置
documind:
  upload:
    path: ./data/uploads
    max-size: 52428800  # 50MB
  vector:
    store:
      path: ./data/vector-store.json  # 向量存储文件路径

# 日志配置
logging:
  level:
    root: INFO
    cn.edu.cdu.documind: DEBUG
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss} - %msg%n'

